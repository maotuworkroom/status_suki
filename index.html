<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
  <title>服务状态 — Sukiing</title>
  <meta name="description" content="Sukiing 服务状态监控 — 实时掌握各项服务运行状况">
  <meta name="theme-color" content="#F8BBD0">
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mdui@2/mdui.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-spinner"></div>
  </div>

  <header class="top-bar">
    <div class="top-bar-inner">
      <a class="top-bar-brand" href="./">
        <img src="icon.png" alt="Sukiing">
        <span>Sukiing Status</span>
      </a>
      <div class="top-bar-actions">
        <div class="lang-switch" id="desktop-lang">
          <button class="lang-btn active" data-lang="zh" onclick="switchLang('zh')">中</button>
          <button class="lang-btn" data-lang="en" onclick="switchLang('en')">EN</button>
          <button class="lang-btn" data-lang="ja" onclick="switchLang('ja')">日</button>
        </div>
        <button class="icon-btn mobile-lang-btn" onclick="showLangMenu()" title="Language">
          <i class="mdui-icon material-icons">translate</i>
        </button>
        <button class="icon-btn" onclick="toggleSearch()" title="Search (S)">
          <i class="mdui-icon material-icons">search</i>
        </button>
        <button class="icon-btn refresh-btn" onclick="refreshData()" title="Refresh (R)">
          <i class="mdui-icon material-icons">refresh</i>
        </button>
        <button class="icon-btn" onclick="toggleTheme()" title="Theme (D)">
          <i class="mdui-icon material-icons" id="theme-icon">dark_mode</i>
        </button>
      </div>
    </div>
  </header>

  <div class="search-bar" id="search-bar">
    <div class="search-input-wrap">
      <i class="mdui-icon material-icons">search</i>
      <input class="search-input" id="search-input" type="text" placeholder="搜索站点..." oninput="filterSites(this.value)">
      <button class="search-clear" onclick="clearSearch()">
        <i class="mdui-icon material-icons">close</i>
      </button>
    </div>
  </div>

  <main class="main-container">
    <div id="incident-banner" class="incident-banner">
      <i class="mdui-icon material-icons">warning</i>
      <span></span>
    </div>

    <div id="overall-status"></div>

    <div class="group-toolbar" id="group-toolbar">
      <div class="toolbar-left">
        <button class="toolbar-btn" onclick="expandAllGroups()">
          <i class="mdui-icon material-icons">unfold_more</i>
          <span id="expand-all-text">展开全部</span>
        </button>
        <button class="toolbar-btn" onclick="collapseAllGroups()">
          <i class="mdui-icon material-icons">unfold_less</i>
          <span id="collapse-all-text">收起全部</span>
        </button>
      </div>
      <span class="countdown-text" id="countdown-text">60s</span>
    </div>

    <div id="groups"></div>
    <div id="incident-history"></div>
    <div class="services-card" id="services-list"></div>

    <div class="shortcuts-hint">
      <span><kbd>R</kbd> 刷新</span>
      <span><kbd>D</kbd> 深色</span>
      <span><kbd>S</kbd> 搜索</span>
    </div>

    <footer class="page-footer">
      <div>Sukiing · 享你所爱之途</div>
      <div id="footer-powered">由 GitHub Actions 驱动</div>
    </footer>
  </main>

  <div class="mdui-menu" id="mobile-lang-menu" style="min-width:100px">
    <div class="mdui-menu-item" data-lang="zh" onclick="switchLang('zh')">
      <div class="mdui-menu-item-text">中文</div>
    </div>
    <div class="mdui-menu-item" data-lang="en" onclick="switchLang('en')">
      <div class="mdui-menu-item-text">English</div>
    </div>
    <div class="mdui-menu-item" data-lang="ja" onclick="switchLang('ja')">
      <div class="mdui-menu-item-text">日本語</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/mdui@2/mdui.min.js"></script>
  <script src="i18n.js"></script>
  <script src="render.js"></script>
  <script>
    function showLangMenu() {
      const el = document.getElementById('mobile-lang-menu');
      const btn = document.querySelector('.mobile-lang-btn');
      if (el && btn) mdui.Menu(btn, el).open();
    }
  </script>
</body>
</html>
