<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Sukiing 服务状态</title>
<meta name="description" content="Sukiing圣地巡礼站服务状态 — 享你所爱之途">
<meta name="theme-color" content="#F8BBD0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Sukiing">
<meta property="og:type" content="website">
<meta property="og:title" content="Sukiing 服务状态">
<meta property="og:description" content="Sukiing圣地巡礼站服务状态监控">
<meta property="og:image" content="icon.png">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png" type="image/png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mdui@1.0.2/css/mdui.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="mdui-appbar mdui-appbar-fixed mdui-color-white mdui-shadow-1">
  <div class="mdui-toolbar mdui-color-white" style="padding:0 12px">
    <img src="icon.png" style="height:26px;border-radius:6px;margin-right:8px" onerror="this.remove()">
    <a class="mdui-typo-headline" style="font-weight:700;font-size:16px;text-decoration:none;color:#333" href=".">Sukiing</a>
    <span style="font-size:11px;color:#999;margin-left:6px">服务状态</span>
    <div class="mdui-toolbar-spacer"></div>
    <span id="last-refresh-text" style="font-size:11px;color:#bbb;margin-right:2px"></span>
    <span id="countdown-text" style="font-size:10px;color:#ccc;margin-right:4px"></span>
    <button class="mdui-btn mdui-btn-icon mdui-btn-dense mdui-ripple" onclick="toggleSearch()" mdui-tooltip="{content:'搜索'}"><i class="mdui-icon material-icons">search</i></button>
    <button class="mdui-btn mdui-btn-icon mdui-btn-dense mdui-ripple mobile-lang-btn" onclick="toggleMobileLang()" mdui-tooltip="{content:'语言'}"><i class="mdui-icon material-icons">translate</i></button>
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="zh" onclick="switchLang('zh')">中</button>
      <button class="lang-btn" data-lang="en" onclick="switchLang('en')">EN</button>
      <button class="lang-btn" data-lang="ja" onclick="switchLang('ja')">日</button>
    </div>
    <button class="mdui-btn mdui-btn-icon mdui-btn-dense mdui-ripple" onclick="toggleTheme()" mdui-tooltip="{content:'主题'}"><i class="mdui-icon material-icons" id="theme-icon">dark_mode</i></button>
    <button class="mdui-btn mdui-btn-icon mdui-btn-dense mdui-ripple refresh-btn" onclick="refreshData()" mdui-tooltip="{content:'刷新'}"><i class="mdui-icon material-icons">refresh</i></button>
  </div>
</div>

<div id="loading-overlay" class="loading-overlay">
  <div class="mdui-spinner mdui-spinner-colorful" style="width:28px;height:28px"></div>
</div>

<main class="mdui-container" style="padding-top:76px;padding-bottom:40px;max-width:800px">

  <div id="incident-banner"></div>
  <div id="overall-status"></div>

  <div id="search-bar" class="mdui-card mdui-shadow-1" style="display:none;padding:6px 12px;margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:6px">
      <i class="mdui-icon material-icons" style="font-size:20px;opacity:0.25">search</i>
      <input id="search-input" type="text" style="flex:1;border:none;outline:none;font-size:14px;background:transparent" placeholder="搜索站点..." oninput="filterSites(this.value)">
      <button class="mdui-btn mdui-btn-icon mdui-btn-dense" onclick="clearSearch()"><i class="mdui-icon material-icons" style="font-size:18px">close</i></button>
    </div>
  </div>

  <div id="group-toolbar" style="display:none;text-align:right;margin-bottom:6px">
    <button class="mdui-btn mdui-btn-dense mdui-ripple" onclick="expandAllGroups()" style="font-size:12px;min-width:0"><i class="mdui-icon material-icons" style="font-size:15px;margin-right:1px">unfold_more</i><span id="expand-all-text">展开全部</span></button>
    <button class="mdui-btn mdui-btn-dense mdui-ripple" onclick="collapseAllGroups()" style="font-size:12px;min-width:0"><i class="mdui-icon material-icons" style="font-size:15px;margin-right:1px">unfold_less</i><span id="collapse-all-text">收起全部</span></button>
  </div>

  <div id="groups"></div>
  <div id="incident-history"></div>

  <div class="mdui-card mdui-shadow-1" style="margin-top:12px">
    <div class="mdui-card-primary" style="padding:12px 16px 6px">
      <div class="mdui-card-primary-title" style="font-size:14px">
        <i class="mdui-icon material-icons" style="font-size:18px;vertical-align:middle;margin-right:4px">list_alt</i>
        <span id="services-heading">服务状态</span>
      </div>
    </div>
    <div id="services-list"></div>
  </div>

  <footer class="page-footer">
    <div style="margin-bottom:2px"><img src="icon.png" style="width:14px;height:14px;border-radius:3px;vertical-align:middle;margin-right:4px" onerror="this.remove()"><b>Sukiing</b> · <span id="footer-text">享你所爱之途</span></div>
    <div style="font-size:11px;opacity:0.4"><span id="footer-powered">Powered by GitHub Actions</span></div>
  </footer>

</main>

<ul id="mobile-lang-menu" class="mdui-menu" mdui-menu>
  <li class="mdui-menu-item mdui-ripple active" data-lang="zh"><a>中文</a></li>
  <li class="mdui-menu-item mdui-ripple" data-lang="en"><a>English</a></li>
  <li class="mdui-menu-item mdui-ripple" data-lang="ja"><a>日本語</a></li>
</ul>

<script src="https://cdn.jsdelivr.net/npm/mdui@1.0.2/js/mdui.min.js"></script>
<script src="i18n.js"></script>
<script src="render.js"></script>
<script>
(function(){
  var _menu=null;
  window.toggleMobileLang=function(){
    var el=document.getElementById('mobile-lang-menu');
    if(!_menu) _menu=new mdui.Menu('.mobile-lang-btn',el,{covered:false});
    _menu.open();
  };
  document.getElementById('mobile-lang-menu').addEventListener('click',function(e){
    var li=e.target.closest('.mdui-menu-item');
    if(!li)return;
    var lang=li.dataset.lang;
    if(lang){switchLang(lang);_menu.close();}
  });
})();
</script>
</body>
</html>
