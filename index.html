<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Sukiing 服务状态</title>
  <meta name="description" content="Sukiing圣地巡礼站 - 服务状态监控。实时查看所有服务的运行状态、响应时间和历史可用率。">
  <meta name="theme-color" content="#F8BBD0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Sukiing Status">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Sukiing 服务状态">
  <meta property="og:description" content="Sukiing圣地巡礼站 - 实时服务状态监控">
  <meta property="og:image" content="icon.png">
  <meta name="twitter:card" content="summary">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mdui@1.0.2/css/mdui.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 加载遮罩 -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner"></div>
  </div>

  <!-- 顶部导航栏 -->
  <header class="app-bar" role="banner">
    <div class="app-bar-inner">
      <div class="app-bar-title">
        <img src="logo.webp" alt="Sukiing" class="app-logo" onerror="this.style.display='none'">
        <div class="app-title-text">
          <span class="app-title-main">Sukiing</span>
          <span class="app-title-sub">服务状态</span>
        </div>
      </div>
      <div class="app-bar-actions">
        <span id="last-refresh-text" class="refresh-hint" aria-live="polite"></span>
        <span id="countdown-text" class="countdown" aria-hidden="true"></span>
        <button class="app-bar-btn" onclick="toggleSearch()" title="搜索 (S)" aria-label="Search">
          <i class="mdui-icon material-icons">search</i>
        </button>
        <div class="lang-switch" role="group" aria-label="Language">
          <button class="lang-btn active" data-lang="zh" onclick="switchLang('zh')">中</button>
          <button class="lang-btn" data-lang="en" onclick="switchLang('en')">EN</button>
          <button class="lang-btn" data-lang="ja" onclick="switchLang('ja')">日</button>
        </div>
        <button class="app-bar-btn mobile-lang-btn" onclick="toggleMobileLang()" title="Language" aria-label="Language">
          <i class="mdui-icon material-icons">translate</i>
        </button>
        <button class="app-bar-btn" onclick="toggleTheme()" title="主题切换 (D)" aria-label="Toggle dark mode">
          <i class="mdui-icon material-icons" id="theme-icon">dark_mode</i>
        </button>
        <button class="app-bar-btn refresh-btn" onclick="refreshData()" title="刷新 (R)" aria-label="Refresh">
          <i class="mdui-icon material-icons">refresh</i>
        </button>
      </div>
    </div>
  </header>

  <!-- 移动端语言菜单 -->
  <div class="mobile-lang-menu" id="mobile-lang-menu">
    <button class="mobile-lang-item active" data-lang="zh" onclick="switchLang('zh');closeMobileLang()">中文</button>
    <button class="mobile-lang-item" data-lang="en" onclick="switchLang('en');closeMobileLang()">English</button>
    <button class="mobile-lang-item" data-lang="ja" onclick="switchLang('ja');closeMobileLang()">日本語</button>
  </div>

  <!-- 主内容区 -->
  <main class="main-container">

    <!-- 公告横幅 -->
    <div id="incident-banner" class="incident-banner"></div>

    <!-- 总状态 -->
    <div id="overall-status" class="overall-status operational"></div>

    <!-- 搜索栏 -->
    <div id="search-bar" class="search-bar" style="display:none">
      <i class="mdui-icon material-icons search-icon">search</i>
      <input type="text" id="search-input" class="search-input" placeholder="搜索站点..." oninput="filterSites(this.value)" aria-label="Search sites">
      <button class="search-clear" onclick="clearSearch()" aria-label="Clear">
        <i class="mdui-icon material-icons">close</i>
      </button>
    </div>

    <!-- 分组工具栏 -->
    <div id="group-toolbar" class="group-toolbar" style="display:none">
      <button class="toolbar-btn" onclick="expandAllGroups()">
        <i class="mdui-icon material-icons">unfold_more</i> <span id="expand-all-text">展开全部</span>
      </button>
      <button class="toolbar-btn" onclick="collapseAllGroups()">
        <i class="mdui-icon material-icons">unfold_less</i> <span id="collapse-all-text">收起全部</span>
      </button>
    </div>

    <!-- 分组列表 -->
    <div id="groups"></div>

    <!-- 事件历史 -->
    <div id="incident-history"></div>

    <!-- 服务状态列表 -->
    <div class="services-section">
      <div class="services-title">
        <i class="mdui-icon material-icons">list_alt</i>
        <span id="services-heading">服务状态</span>
      </div>
      <div id="services-list"></div>
    </div>

    <!-- 页脚 -->
    <footer class="page-footer">
      <div class="footer-brand">
        <img src="icon.png" alt="" class="footer-icon" onerror="this.style.display='none'">
        <span class="footer-name">Sukiing</span>
        <span class="footer-sep">·</span>
        <span id="footer-text">享你所爱之途</span>
      </div>
      <div class="footer-meta">
        <span id="footer-powered">Powered by GitHub Actions</span>
        <span class="footer-sep">·</span>
        <span class="kbd">R</span> <span id="footer-refresh-hint">刷新</span>
        <span class="footer-sep">·</span>
        <span class="kbd">D</span> <span id="footer-theme-hint">主题</span>
      </div>
    </footer>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/mdui@1.0.2/js/mdui.min.js"></script>
  <script src="i18n.js"></script>
  <script src="render.js"></script>
  <script>
    function toggleMobileLang() {
      document.getElementById('mobile-lang-menu').classList.toggle('show');
    }
    function closeMobileLang() {
      document.getElementById('mobile-lang-menu').classList.remove('show');
    }
    document.addEventListener('click', function(e) {
      var menu = document.getElementById('mobile-lang-menu');
      if (!e.target.closest('.mobile-lang-btn') && !e.target.closest('.mobile-lang-menu')) {
        menu.classList.remove('show');
      }
    });
  </script>

</body>
</html>
