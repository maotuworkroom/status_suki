<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suki.ing Status</title>
  <meta name="description" content="Suki.ing 服务状态监控">
  <meta name="theme-color" content="#F8BBD0">
  <link rel="icon" href="logo.webp" type="image/webp">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page">

    <!-- 顶栏 -->
    <header class="topbar">
      <div class="topbar-inner">
        <div class="topbar-left">
          <img src="logo.webp" alt="" class="topbar-logo" id="appBarLogo">
          <span class="topbar-title" id="pageTitle">Suki.ing Status</span>
        </div>
        <div class="topbar-right">
          <button class="btn-icon" id="langBtn" title="Language">
            <span class="material-symbols-outlined">language</span>
          </button>
          <button class="btn-icon" id="themeBtn" title="Theme">
            <span class="material-symbols-outlined" id="themeIcon">dark_mode</span>
          </button>
          <button class="btn-icon" id="refreshBtn" title="Refresh">
            <span class="material-symbols-outlined">refresh</span>
          </button>
        </div>
      </div>
    </header>

    <!-- 语言菜单 -->
    <div class="lang-menu" id="langMenu">
      <div class="lang-opt" data-lang="zh-CN">🇨🇳 简体中文</div>
      <div class="lang-opt" data-lang="en-US">🇺🇸 English</div>
      <div class="lang-opt" data-lang="ja-JP">🇯🇵 日本語</div>
      <div class="lang-opt" data-lang="ko-KR">🇰🇷 한국어</div>
    </div>

    <!-- 主区域 -->
    <main class="content">

      <!-- 加载态 -->
      <div class="loader" id="loadingOverlay">
        <div class="spinner"></div>
        <span data-i18n="loading">加载中...</span>
      </div>

      <!-- 全局状态 -->
      <section class="hero" id="globalStatusCard" data-status="operational">
        <div class="hero-icon" id="globalStatusIcon">
          <span class="material-symbols-outlined">check_circle</span>
        </div>
        <h1 class="hero-text" id="globalStatusText">系统一切正常</h1>
        <p class="hero-sub">
          <span data-i18n="lastUpdated">最后更新于</span>
          <span id="lastUpdateTime">--:--:--</span>
          <span id="lastUpdateAgo"></span>
        </p>
      </section>

      <!-- 分组 -->
      <div id="groupsContainer"></div>

      <!-- 服务总览 -->
      <section class="card" id="serviceListSection">
        <h2 class="card-title">
          <span class="material-symbols-outlined">list_alt</span>
          <span data-i18n="serviceStatus">服务状态总览</span>
        </h2>
        <div id="serviceList" style="padding:4px 0"></div>
      </section>

    </main>

    <!-- 底部 -->
    <footer class="footer">
      <p id="copyrightText">© Suki.ing</p>
      <p class="footer-sub">
        <span data-i18n="autoRefresh">每60秒自动刷新</span> ·
        <span data-i18n="poweredBy">自动监测 · 每5分钟刷新</span>
      </p>
    </footer>

  </div>

  <script src="config.js"></script>
  <script src="render.js"></script>
</body>
</html>
