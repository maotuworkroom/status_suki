<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Sukiing</title>
  <meta name="theme-color" content="#F8BBD0">
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding: 24px;
      font-family: 'Noto Sans SC', sans-serif;
      background: #FFF8FA;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(248, 187, 208, 0.2) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(255, 64, 129, 0.1) 0%, transparent 50%);
      color: #212121;
    }
    .error-code {
      font-size: 96px;
      font-weight: 900;
      background: linear-gradient(135deg, #FF4081, #F48FB1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .error-msg { font-size: 18px; font-weight: 600; color: #757575; }
    .error-link {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 28px;
      border-radius: 24px;
      background: linear-gradient(135deg, #FF4081, #F48FB1);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(255, 64, 129, 0.3);
    }
    .error-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 64, 129, 0.4);
    }
    .footer { margin-top: 40px; font-size: 12px; color: #bdbdbd; }
  </style>
</head>
<body>
  <div class="error-code">404</div>
  <div class="error-msg">页面不存在</div>
  <a class="error-link" href="./">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    返回状态页
  </a>
  <div class="footer">Sukiing · 享你所爱之途</div>
</body>
</html>
